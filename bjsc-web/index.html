<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BJSC - Blackjack Strategy Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            padding-top: 2rem;
            min-height: 100vh;
        }

        .app {
            width: 100%;
            max-width: 520px;
            padding: 0 1rem;
        }

        .hidden { display: none !important; }

        .mode-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #333;
        }

        .mode-name {
            color: #ffd166;
            font-weight: bold;
        }

        .mode-btn {
            font-family: inherit;
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
            border: 1px solid #555;
            border-radius: 4px;
            background: #2a2a4a;
            color: #aaa;
            cursor: pointer;
        }
        .mode-btn:hover { background: #3a3a6a; border-color: #7ec8e3; }

        .stats-panel, .error-log {
            border: 1px solid #444;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
        }

        .panel-title {
            font-weight: bold;
            color: #7ec8e3;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .label { font-weight: bold; color: #aaa; }

        .sub-stats {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.25rem;
        }

        .hands-area { margin-bottom: 1.5rem; }

        .hand-row {
            font-size: 1.3rem;
            padding: 0.4rem 0;
        }

        .hand-label {
            font-weight: bold;
            color: #7ec8e3;
        }

        .cards {
            font-size: 1.4rem;
            letter-spacing: 0.1em;
        }

        .status {
            text-align: center;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .status.correct { background: #1b4332; color: #95d5b2; }
        .status.error   { background: #641220; color: #ffc2c2; }

        .actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .action-btn {
            font-family: inherit;
            font-size: 1rem;
            padding: 0.6rem 1.4rem;
            border: 1px solid #555;
            border-radius: 6px;
            background: #2a2a4a;
            color: #e0e0e0;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .action-btn:hover {
            background: #3a3a6a;
            border-color: #7ec8e3;
        }
        .action-btn:active { background: #4a4a8a; }

        .shuffle-btn {
            background: #2a4a2a;
            border-color: #4a8a4a;
        }
        .shuffle-btn:hover {
            background: #3a6a3a;
            border-color: #6aba6a;
        }

        .error-log { max-height: 300px; overflow-y: auto; }

        .log-entry {
            padding: 0.3rem 0;
            border-bottom: 1px solid #333;
            font-size: 0.85rem;
        }

        .error-marker {
            color: #ff6b6b;
            font-weight: bold;
        }

        .keyboard-hint {
            text-align: center;
            color: #666;
            font-size: 0.8rem;
            padding: 1rem 0;
        }

        .tab-btn { margin-left: auto; }

        .histogram-screen { margin-bottom: 1.5rem; }

        .histogram-title {
            font-weight: bold;
            color: #7ec8e3;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .histogram-bar-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.4rem;
        }

        .histogram-label {
            width: 5.5rem;
            text-align: right;
            font-size: 0.85rem;
            color: #aaa;
            flex-shrink: 0;
        }

        .histogram-bar-bg {
            flex: 1;
            height: 1.4rem;
            background: #2a2a3a;
            border-radius: 3px;
            overflow: hidden;
        }

        .histogram-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
            min-width: 2px;
        }

        .histogram-count {
            width: 2.5rem;
            text-align: right;
            font-size: 0.9rem;
            color: #e0e0e0;
            flex-shrink: 0;
        }

        .histogram-unseen {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body></body>
</html>
